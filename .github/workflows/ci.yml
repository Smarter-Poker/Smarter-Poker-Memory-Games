name: CI — Build & Type Safety

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 1: TypeScript compilation check
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 20
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript Check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2: Full production build + bundle metrics + security audit
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Production Build
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 20
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # ── Security Audit (advisory — does not block deploy) ─────────────
      - name: Security Audit
        continue-on-error: true
        run: |
          echo "## 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          AUDIT=$(npm audit --production 2>&1 || true)
          VULNS=$(echo "$AUDIT" | grep -c "Severity:" || echo "0")
          if [ "$VULNS" -gt 0 ]; then
            echo "⚠️ Found $VULNS vulnerability(ies)" >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No known vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── Bundle Size Tracking ─────────────────────────────────────────
      - name: Track Bundle Size
        if: success()
        run: |
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY

          TOTAL_JS=0
          TOTAL_CSS=0

          for f in .next/assets/*.js .next/**/*.js; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f" | tr -d ' ')
              GZIP=$(gzip -c "$f" | wc -c | tr -d ' ')
              SIZE_KB=$((SIZE / 1024))
              GZIP_KB=$((GZIP / 1024))
              TOTAL_JS=$((TOTAL_JS + SIZE))
              BASENAME=$(basename "$f")
              echo "| \`${BASENAME}\` | ${SIZE_KB}kB | ${GZIP_KB}kB |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          for f in .next/assets/*.css .next/**/*.css; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f" | tr -d ' ')
              GZIP=$(gzip -c "$f" | wc -c | tr -d ' ')
              SIZE_KB=$((SIZE / 1024))
              GZIP_KB=$((GZIP / 1024))
              TOTAL_CSS=$((TOTAL_CSS + SIZE))
              BASENAME=$(basename "$f")
              echo "| \`${BASENAME}\` | ${SIZE_KB}kB | ${GZIP_KB}kB |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          TOTAL_JS_KB=$((TOTAL_JS / 1024))
          TOTAL_CSS_KB=$((TOTAL_CSS / 1024))
          TOTAL_KB=$(( (TOTAL_JS + TOTAL_CSS) / 1024 ))

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total JS:** ${TOTAL_JS_KB}kB | **Total CSS:** ${TOTAL_CSS_KB}kB | **Grand Total:** ${TOTAL_KB}kB" >> $GITHUB_STEP_SUMMARY

          if [ $TOTAL_KB -gt 5120 ]; then
            echo "::error::Bundle size exceeds 5MB limit (${TOTAL_KB}kB)"
            exit 1
          fi
          echo "✅ Bundle size: ${TOTAL_KB}kB (limit: 5120kB)"

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 3: Deploy to Vercel ONLY after typecheck + build pass (push only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: [typecheck, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          npm install -g vercel
          DEPLOY_URL=$(vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -oE 'https://[^ ]+\.vercel\.app' | head -1)
          echo "url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
          echo "✅ Deployed: ${DEPLOY_URL}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post Deploy Summary
        if: success()
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Report Failure
        if: failure()
        run: |
          echo "## ❌ Deployment FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "TypeScript and build passed, but Vercel deployment failed." >> $GITHUB_STEP_SUMMARY
          echo "Check Vercel dashboard for details." >> $GITHUB_STEP_SUMMARY
